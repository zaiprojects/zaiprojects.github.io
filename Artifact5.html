<!DOCTYPE html>
<html>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Lexend&display=swap');

		body {
			font-family: 'Lexend', sans-serif;
			color: white;
			background-color: black;
		}

		#content {
			opacity: 0;
			transition: opacity 1.5s ease;
      position: relative;
      z-index: 20;
		}
		
    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      z-index: 10;
      background: black;
      opacity: 0;
      transition: opacity 1s ease;
    }

		.void-button {
				font-family: 'Lexend', sans-serif;
				font-size: 24px;
				padding: 10px 20px;
				background: white;
				color: black;
				border: none;
				cursor: pointer;
		}

    .glitch {
      font-family: monospace;
      letter-spacing: 2px;
      display: inline-block;
      width: 8ch;  
      height: 2ch;
      text-align: left;
    }
	</style>

	<body>
		<div id="startScreen" style="text-align: center; margin-top: 200px;">
			<p style="font-size: 100px;">LEVEL <span class="glitch" data-text="OMNIL">OMNIL</span> - The Everynot</p>
      <button id="startBtn" class="void-button">
				Hey.
			</button>
			<p>"It's time we had a chat"</p>
		</div>
	
		<div id="content" style="display: none;">
			<div id="nextButton" style="margin-top: 30px; text-align: center; display: none;">
				<button class="void-button" onclick="location.href='hope.html'">
					Escape.
				</button>
			</div>
		</div>
		

<video id="bg" playsinline>
  <source src="chat.mp4" type="video/mp4">
</video>

<script>
  const btn = document.getElementById("startBtn");
  const content = document.getElementById("content");
  const video = document.getElementById("bg");
  const nextButton = document.getElementById("nextButton");

  btn.addEventListener("click", () => {
    document.getElementById("startScreen").style.display = "none";

    // Show video
    video.style.display = "block";

    setTimeout(() => {
      video.style.opacity = 1;
    }, 50);

    // Enable audio playback (user gesture allows this)
    video.muted = false;
    video.volume = 1;

    // Play video
    video.play().catch(err => {
      console.log("Playback failed:", err);
    });

    // Ensure we only attach this once
    video.addEventListener("ended", () => {
      // Show content container
      content.style.display = "block";

      setTimeout(() => {
        content.style.opacity = 1;
      }, 50);

      // Show button
      nextButton.style.display = "block";
    }, { once: true });
  });

  // Glitch effect
  const chars = "OMNILすべて全全全hvaðeina-+=";

  function randomChar() {
    return chars[Math.floor(Math.random() * chars.length)];
  }

  function glitchEffect(element) {
    const target = element.dataset.text;

    setInterval(() => {
      let output = "";

      for (let i = 0; i < target.length; i++) {
        output += Math.random() < 0.5
          ? target[i]
          : randomChar();
      }

      element.textContent = output;
    }, 50);
  }

  document.querySelectorAll(".glitch").forEach(el => {
    glitchEffect(el);
  });
</script>


	</body>
</html>
